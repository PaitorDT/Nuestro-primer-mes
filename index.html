<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Yacory ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
    transition: background 1s, opacity 1s;
}

/* 🌙 Modo noche */
body.noche {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* 🌌 Estrellas */
.estrella {
    position: fixed;
    width: 2px;
    height: 2px;
    background: white;
    animation: parpadeo 2s infinite alternate;
}

@keyframes parpadeo {
    from {opacity: 0.2;}
    to {opacity: 1;}
}

/* Animación entrada */
#contenido {
    position: relative;
    z-index: 2;
    padding: 20px;
    animation: aparecer 1.5s ease;
}

@keyframes aparecer {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

#inicio {
    position: absolute;
    width: 100%;
    top: 40%;
}

/* Corazones */
#corazones-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
}

.corazon {
    position: absolute;
    animation: flotar linear infinite;
}

@keyframes flotar {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* Texto */
h1 { font-size: clamp(28px,6vw,40px); }

/* ✨ Nombre neón */
#nombre {
    font-size: clamp(30px,8vw,50px);
    opacity: 0;
    animation: brillo 2s infinite alternate;
}

@keyframes brillo {
    from {text-shadow: 0 0 10px pink;}
    to {text-shadow: 0 0 30px white, 0 0 50px pink;}
}

#texto {
    font-size: clamp(16px,4vw,22px);
    margin-top: 20px;
}

/* Botón */
button {
    padding: 14px 28px;
    font-size: clamp(16px,4vw,18px);
    background: white;
    color: #ff4d6d;
    border-radius: 25px;
    border: none;
    cursor: pointer;
}

/* Final */
#final { display:none; margin-top:40px; }
</style>
</head>

<body>

<div id="corazones-bg"></div>

<div id="inicio">
    <h1>💖 Tengo algo especial para ti 💖</h1>
    <button onclick="iniciar()">Haz click amorcito ❤️</button>
</div>

<div id="contenido" style="display:none;">
    <h1>Feliz 1 mes</h1>
    <div id="nombre">Yacory 💖</div>
    <div id="texto"></div>
    <h2 id="contador"></h2>

    <div id="final">
        <h2>¿Quieres seguir creando momentos conmigo? ❤️</h2>
        <button onclick="respuesta()">Sí 💖</button>
    </div>
</div>

<audio id="musica" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<audio id="latido">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b6f4c.mp3">
</audio>

<script>
document.addEventListener("DOMContentLoaded", () => {

const mensajes = [
"Hola amorcito 🥰",
"Hoy cumplimos nuestro primer mes 💖",
"Y eres algo muy especial para mí ✨",
"Desde que llegaste todo cambió 💫",
"Tu sonrisa... tu forma de ser...",
"todo de ti me encanta ❤️",
"Gracias por existir, Yacory 🥹",
"Y quiero seguir contigo mucho tiempo más 💕",
"Te quiero muchísimo amorcito 💖"
];

let i=0,j=0;

const texto = document.getElementById("texto");
const inicio = document.getElementById("inicio");
const contenido = document.getElementById("contenido");
const musica = document.getElementById("musica");
const contador = document.getElementById("contador");
const final = document.getElementById("final");
const nombre = document.getElementById("nombre");
const latido = document.getElementById("latido");

/* 🌌 estrellas */
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="estrella";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}

/* 🌙 noche */
if(new Date().getHours() >= 18){
    document.body.classList.add("noche");
}

function escribir(){
    if(i<mensajes.length){
        if(j<mensajes[i].length){
            texto.innerHTML+=mensajes[i][j];
            j++;
            setTimeout(escribir,40);
        } else {
            texto.innerHTML+="<br><br>";
            i++; j=0;
            setTimeout(escribir,700);
        }
    } else {
        final.style.display="block";
    }
}

function corazones(){
    const c=document.createElement("div");
    c.innerHTML="❤️";
    c.className="corazon";
    c.style.left=Math.random()*100+"vw";
    c.style.animationDuration=(Math.random()*4+3)+"s";
    document.getElementById("corazones-bg").appendChild(c);
    setTimeout(()=>c.remove(),6000);
}

window.iniciar=function(){
    inicio.style.display="none";
    contenido.style.display="block";

    musica.play().catch(()=>{});
    nombre.style.opacity=1;

    let voz=new SpeechSynthesisUtterance("Yacory...");
    speechSynthesis.speak(voz);

    escribir();
    setInterval(corazones,300);
    contadorTiempo();
};

function contadorTiempo(){
    const inicioFecha=new Date("2026-03-28");
    setInterval(()=>{
        let dias=Math.floor((new Date()-inicioFecha)/(1000*60*60*24));
        contador.innerHTML="Llevamos "+dias+" días juntos 💖";
    },1000);
}

/* 💖 FINAL */
window.respuesta=function(){

    latido.play().catch(()=>{});

    // 💥 explosión
    for(let i=0;i<80;i++){
        setTimeout(()=>{
            const c=document.createElement("div");
            c.innerHTML="💖";
            c.style.position="fixed";
            c.style.left="50%";
            c.style.top="50%";

            const x=Math.random()*600-300;
            const y=Math.random()*600-300;

            c.style.transition="1s";
            document.body.appendChild(c);

            setTimeout(()=>{
                c.style.transform=`translate(${x}px,${y}px) scale(1.5)`;
                c.style.opacity="0";
            },10);

            setTimeout(()=>c.remove(),1000);
        },i*15);
    }

    document.body.style.opacity="0";

    setTimeout(()=>{

        document.body.innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;">
            <h1 style="animation:zoom 2s;">💖 Te amo mucho Yacory 💖</h1>
            <p>Gracias por este mes tan bonito 🥹<br>Y por todos los que vienen ❤️</p>

            <button onclick="mostrarCarta()" style="margin-top:30px;">
                💌 Abrir sorpresa
            </button>
        </div>

        <style>
        @keyframes zoom{
            from{transform:scale(0.5);opacity:0;}
            to{transform:scale(1);opacity:1;}
        }
        </style>
        `;

        document.body.style.opacity="1";

    },1000);
};

/* 💌 CARTA SECRETA */
window.mostrarCarta=function(){
    document.body.innerHTML=`
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;padding:20px;text-align:center;">
        <div style="background:rgba(255,255,255,0.1);padding:25px;border-radius:20px;">
            <h2>Para ti, amorcito 💖</h2>
            <p style="margin-top:15px;">
            No sé cómo empezó todo...<br>
            pero sí sé que quiero que continúe 🥹<br><br>
            Gracias por hacerme feliz ❤️<br>
            Este es solo el comienzo 💫
            </p>
        </div>
    </div>
    `;
};

});
</script>

</body>
</html>
